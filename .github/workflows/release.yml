name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      mode:
        description: 'Build mode'
        required: true
        type: choice
        default: 'release'
        options:
          - release    # собрать и загрузить в GitHub Release
          - artifacts  # собрать и сохранить как Actions artifacts (без релиза)

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  # release — при триггере от release event; иначе берём из inputs
  BUILD_MODE: ${{ github.event_name == 'release' && 'release' || inputs.mode }}

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release if triggered manually in release mode
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view ${{ env.RELEASE_TAG }} >/dev/null 2>&1 || \
            gh release create ${{ env.RELEASE_TAG }} \
              --title "${{ env.RELEASE_TAG }}" \
              --notes "Released ${{ env.RELEASE_TAG }}"

  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install cross-compilation toolchains
        run: sudo apt-get update && sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 CC=gcc \
            go build -ldflags="-s -w" -o max-telegram-bridge-bot-linux-amd64 .

      - name: Build linux/arm64
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -ldflags="-s -w" -o max-telegram-bridge-bot-linux-arm64 .

      # Загружаем в релиз
      - name: Upload binaries to release
        if: env.BUILD_MODE == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ env.RELEASE_TAG }} \
            max-telegram-bridge-bot-linux-amd64 \
            max-telegram-bridge-bot-linux-arm64 \
            --clobber

      # Сохраняем как Actions artifact
      - name: Save binaries as artifacts
        if: env.BUILD_MODE == 'artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ env.RELEASE_TAG }}
          retention-days: 7
          path: |
            max-telegram-bridge-bot-linux-amd64
            max-telegram-bridge-bot-linux-arm64

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: env.BUILD_MODE == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # Push multi-arch в GHCR — только в release режиме
      - name: Build and push to GHCR (multi-arch)
        if: env.BUILD_MODE == 'release'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ env.RELEASE_TAG }}
            ghcr.io/${{ steps.repo.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export linux/amd64 image as tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: max-telegram-bridge-bot:${{ env.RELEASE_TAG }}
          outputs: type=docker,dest=max-telegram-bridge-bot-linux-amd64-docker.tar
          cache-from: type=gha

      - name: Export linux/arm64 image as tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/arm64
          tags: max-telegram-bridge-bot:${{ env.RELEASE_TAG }}
          outputs: type=docker,dest=max-telegram-bridge-bot-linux-arm64-docker.tar
          cache-from: type=gha

      # Загружаем tar в релиз
      - name: Upload Docker tars to release
        if: env.BUILD_MODE == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ env.RELEASE_TAG }} \
            max-telegram-bridge-bot-linux-amd64-docker.tar \
            max-telegram-bridge-bot-linux-arm64-docker.tar \
            --clobber

      # Сохраняем tar как Actions artifact
      - name: Save Docker tars as artifacts
        if: env.BUILD_MODE == 'artifacts'
        uses: actions/upload-artifact@v4
        with:
          name: docker-${{ env.RELEASE_TAG }}
          retention-days: 7
          path: |
            max-telegram-bridge-bot-linux-amd64-docker.tar
            max-telegram-bridge-bot-linux-arm64-docker.tar
